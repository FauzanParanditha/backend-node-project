name: Type Check & Build

on:
    push:
        branches: [main, develop]
    pull_request:
        branches: [main, develop]

jobs:
    typecheck:
        name: TypeScript Type Check
        runs-on: ubuntu-latest

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: "20"
                  cache: "npm"

            - name: Install dependencies
              run: npm ci

            - name: Run Unit Tests
              run: npm run test

            - name: Type check
              run: npm run typecheck

            - name: Lint
              run: npx eslint src/ --max-warnings 999

            - name: Build
              run: npm run build
