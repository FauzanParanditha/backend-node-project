kind: Deployment
apiVersion: apps/v1
metadata:
  name: d-payhub-be
  namespace: dev
  labels:
    app: proxy-payhub-be
    env: dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: d-payhub-be
      env: dev
  template:
    metadata:
      labels:
        app: d-payhub-be
        env: dev
    spec:
      volumes:
        - name: payhub-be-env
          configMap:
            name: d-payhub-be-env
            items:
              - key: .env
                path: .env
        - name: payhub-cert
          persistentVolumeClaim:
            claimName: pvc-payhub-cert
      containers:
        - name: d-payhub-be
          image: 'images.247.or.id/pandi/payment-aggregator-backend:latest'
          ports:
            - name: http
              containerPort: 80
              protocol: TCP
          volumeMounts:
            - name: payhub-be-env
              mountPath: /app/.env
              subPath: .env
            - name: payhub-cert
              mountPath: /app/public-key.pem
              subPath: payhub-cert/public-key.pem
            - name: payhub-cert
              mountPath: /app/private-key.pem
              subPath: payhub-cert/private-key.pem
            - name: payhub-cert
              mountPath: /app/public.pem
              subPath: payhub-cert/public.pem
          imagePullPolicy: Always
      restartPolicy: Always
      imagePullSecrets:
        - name: secret-dev