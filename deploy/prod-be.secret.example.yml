# =============================================================================
# PROPOSAL untuk DevOps review — migrasi prod BE env: ConfigMap -> Secret
# =============================================================================
# File ini BUKAN untuk langsung apply mentah. Ini versi `prod-be.yml` yang
# memindahkan sumber /app/.env dari ConfigMap `payhub-be-config` ke Secret
# `payhub-be-env`, supaya kredensial (MONGODB_URI, JWT private key, mail/Xendit
# key, ENCRYPTION_KEY/HMAC_KEY, SEED_ADMIN_PASSWORD) tidak lagi tersimpan
# plaintext di etcd.
#
# Perbedaan dari prod-be.yml yang live: HANYA blok volume `payhub-be-config`
# (configMap -> secret). Sisanya (cert PVC, mount /app/logs, hostAliases,
# imagePullSecrets) identik.
#
# -----------------------------------------------------------------------------
# LANGKAH MIGRASI (urut — Secret DULU, baru roll)
# -----------------------------------------------------------------------------
# 1. Turunkan .env dari ConfigMap lama sebagai basis:
#      kubectl -n prod get configmap payhub-be-config \
#        -o jsonpath='{.data.\.env}' > be.env
#
# 2. Pastikan be.env berisi LOG_DIR (untuk logging Opsi C ke /app/logs):
#      grep -q '^LOG_DIR=' be.env || echo 'LOG_DIR=/app/logs' >> be.env
#    (kalau sudah ada tapi salah, betulkan jadi LOG_DIR=/app/logs)
#
# 3. Buat Secret dari be.env:
#      kubectl -n prod create secret generic payhub-be-env \
#        --from-file=.env=./be.env --dry-run=client -o yaml | kubectl apply -f -
#
# 4. Apply Deployment versi ini + rollout:
#      kubectl -n prod apply -f deploy/prod-be.secret.yml
#      kubectl -n prod rollout status deploy/payhub-be --timeout=120s
#
# 5. Verifikasi pod sehat + env kebaca:
#      kubectl -n prod get pods -l app=payhub-be
#      kubectl -n prod exec deploy/payhub-be -- sh -c 'grep -c MONGODB_URI /app/.env'
#      kubectl -n prod exec deploy/payhub-be -- printenv LOG_DIR   # /app/logs
#
# 6. Setelah TERBUKTI sehat, hapus ConfigMap lama:
#      kubectl -n prod delete configmap payhub-be-config
#    (jangan hapus sebelum rollout baru terbukti jalan — untuk rollback)
#
# Catatan: `be.env` berisi rahasia — JANGAN commit ke repo, hapus setelah dipakai.
# =============================================================================
kind: Deployment
apiVersion: apps/v1
metadata:
  name: payhub-be
  namespace: prod
  labels:
    app: proxy-payhub-be
    env: prod
spec:
  replicas: 1
  selector:
    matchLabels:
      app: payhub-be
      env: prod
  template:
    metadata:
      labels:
        app: payhub-be
        env: prod
    spec:
      volumes:
        # Env holds secrets (DB URI, mail/Xendit keys, JWT private keys, seed
        # admin creds) — backed by a Secret (not a ConfigMap) so values are not
        # stored plaintext in etcd. Still mounted as /app/.env so dotenv keeps
        # working without code changes.
        - name: payhub-be-config
          secret:
            secretName: payhub-be-env
            items:
              - key: .env
                path: .env
        - name: payhub-cert
          persistentVolumeClaim:
            claimName: pvc-payhub-be
      containers:
        - name: payhub-be
          image: 'images.247.or.id/pandi/payment-aggregator-backend:latest'
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          volumeMounts:
            - name: payhub-be-config
              mountPath: /app/.env
              subPath: .env
            - name: payhub-cert
              mountPath: /app/public-key.pem
              subPath: payhub-cert/public-key.pem
            - name: payhub-cert
              mountPath: /app/private-key.pem
              subPath: payhub-cert/private-key.pem
            - name: payhub-cert
              mountPath: /app/public.pem
              subPath: payhub-cert/public.pem
            - name: payhub-cert
              mountPath: /app/logs
              subPath: logs
          imagePullPolicy: Always
      hostAliases:
        - ip: 10.2.11.66
          hostnames:
            - mongo1
        - ip: 10.2.11.67
          hostnames:
            - mongo2
        - ip: 10.2.11.68
          hostnames:
            - mongo3
      restartPolicy: Always
      imagePullSecrets:
        - name: secret-prod
