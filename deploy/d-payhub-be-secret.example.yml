# TEMPLATE ONLY — do NOT commit real secret values.
#
# Replaces the former ConfigMap `d-payhub-be-env`. The app reads /app/.env via
# dotenv, so the whole env file lives under the single `.env` key and is mounted
# as a file by deploy/d-pa-be.yml (volume `payhub-be-env`, subPath .env).
#
# Apply the real values out-of-band, e.g. from a populated .env file:
#   kubectl -n dev create secret generic d-payhub-be-env --from-file=.env=./.env
# (or `kubectl create secret ... --dry-run=client -o yaml | kubectl apply -f -`)
#
# When migrating from the ConfigMap: create this Secret, apply the patched
# deploy/d-pa-be.yml, roll the deployment, verify, then delete the old ConfigMap:
#   kubectl -n dev delete configmap d-payhub-be-env
apiVersion: v1
kind: Secret
metadata:
  name: d-payhub-be-env
  namespace: dev
  labels:
    app: d-payhub-be
    env: dev
type: Opaque
stringData:
  .env: |
    PORT=
    MONGODB_URI=
    NODE_ENV=production

    ACCESS_TOKEN_PRIVATE_KEY=
    ACCESS_TOKEN_ADMIN_PRIVATE_KEY=

    # AES-256 + HMAC keys (64 hex chars each). SHARED with the frontend
    # (d-payhub-fe-env) — BE encrypts the order payload in the payment link and
    # FE decrypts it, so both must hold the SAME rotated value. encryption.ts
    # throws at startup if these are missing/invalid.
    ENCRYPTION_KEY=
    HMAC_KEY=

    FRONTEND_URL=
    FRONTEND_URL_APPS_2=
    FRONTEND_URL_APPS_3=

    MAIL_ADDRESS=
    MAIL_PASSWORD=
    MAIL_URL=
    HMAC_VERIFICATION_CODE=

    # PAYLABS
    PAYLABS_API_URL=
    PAYLABS_MERCHANT_ID=

    # XENDIT
    XENDIT_SECRET_KEY=
    XENDIT_SECRET_CALLBACK=

    # RATE_LIMIT
    RATE_LIMIT_MAX=

    # DISCORD WEBHOOKS ALERTS
    DISCORD_WEBHOOK_URL_ERROR=
    DISCORD_WEBHOOK_URL_REVENUE=
    DISCORD_WEBHOOK_URL_SECURITY=
    DISCORD_WEBHOOK_URL_API_ERROR=
    DISCORD_WEBHOOK_URL_REPORT=
    DISCORD_WEBHOOK_URL_AUTH=

    # CRON SETTINGS
    ENABLE_CRON=true

    # ADMIN SEEDER (required by seedAdmins — never hardcode credentials)
    SEED_ADMIN_EMAIL=
    SEED_ADMIN_PASSWORD=
